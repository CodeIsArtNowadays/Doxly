services:
  frontend:
    build: frontend/
    ports: 
       - "5173:5173"
    volumes:
       - ./frontend:/app
       - /app/node_modules
    
  app:
    build: backend/
    ports:
      - "8000:8000"
    env_file: backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app

  db: 
    image: postgres:14.23-alpine3.23
    volumes:
       - postgres_data:/var/lib/postgresql/data
    env_file: backend/.env

volumes:
  postgres_data:
       